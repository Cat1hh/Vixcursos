<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Vix Cursos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css_adm/login.css">
</head>
<body>
    <main class="shell">
        <section class="panel">
            <form class="card" id="loginForm" autocomplete="off">
                <div class="login-brand">
                    <img src="../imagem/VIxcursos.png" alt="Logo Vix Cursos" class="login-logo">
                    <div class="login-brand-text">
                        <strong>Vix Cursos</strong>
                        <span>Administrativo</span>
                    </div>
                </div>
                <h3>Entrar no admin</h3>
                <p>Acesso restrito ao painel administrativo.</p>

                <div class="field">
                    <label for="username">Usuário</label>
                    <input id="username" name="username" type="text" placeholder="Seu usuário" required autofocus>
                </div>

                <div class="field">
                    <label for="password">Senha</label>
                    <input id="password" name="password" type="password" placeholder="Sua senha" required>
                </div>

                <div class="actions">
                    <button class="button" id="submitBtn" type="submit">Entrar</button>
                </div>

                <div class="status" id="statusMsg" aria-live="polite"></div>
            </form>
        </section>
    </main>

    <script>
        const form = document.getElementById('loginForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        function setStatus(message, type = '') {
            statusMsg.textContent = message;
            statusMsg.className = `status ${type}`.trim();
        }

        async function verificarSessao() {
            try {
                const res = await fetch('/api/admin/me');
                if (res.ok) {
                    window.location.href = 'menu.html';
                }
            } catch (error) {
                console.error('Falha ao verificar sessão:', error);
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            submitBtn.disabled = true;
            setStatus('Validando acesso...');

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    setStatus(data.error || 'Credenciais inválidas.', 'error');
                    submitBtn.disabled = false;
                    passwordInput.value = '';
                    passwordInput.focus();
                    return;
                }

                setStatus('Acesso liberado. Redirecionando...', 'success');
                window.location.href = 'menu.html';
            } catch (error) {
                console.error(error);
                setStatus('Falha na comunicação com o servidor.', 'error');
                submitBtn.disabled = false;
            }
        });

        verificarSessao();
    </script>
</body>
</html>
